name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: 24.x

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 24.x ]
        os: [ ubuntu-latest ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Dependency audit
        run: npm audit

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Axe accessibility smoke checks
        run: npm run a11y

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: SSR public asset smoke
        run: npm run smoke:ssr-assets

      - name: SSR route rule smoke
        run: npm run smoke:ssr-routes
