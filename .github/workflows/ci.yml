name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  appearance-controls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Guard footer appearance controls
        run: |
          set -euo pipefail

          grep -R --fixed-strings --line-number 'class="site-footer__appearance" aria-label="Appearance controls"' \
            front-end/src/layouts/default.vue \
            front-end/src/layouts/home.vue

          ! grep -R --fixed-strings --line-number 'class="site-header__controls" aria-label="Appearance controls"' \
            front-end/src/layouts/default.vue \
            front-end/src/layouts/home.vue

          grep -R -E --line-number 'palette footer regression|keeps the palette switcher next to the compact color-mode toggle in the footer' \
            front-end/test/palette-header-regression.test.ts \
            front-end/test/theme-controls.test.ts

          ! grep -R -E --line-number 'palette header regression|keeps the palette switcher next to the compact color-mode toggle in the header' \
            front-end/test/palette-header-regression.test.ts \
            front-end/test/theme-controls.test.ts

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 24.x ]
        os: [ ubuntu-latest ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Dependency audit
        run: npm audit

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build frontend
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: npm run -w front-end build

      - name: Axe accessibility smoke checks
        run: npm run a11y

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: npm run build

      - name: SSR public asset smoke
        run: npm run smoke:ssr-assets

      - name: SSR route rule smoke
        run: npm run smoke:ssr-routes
