name: Live smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public or staging origin to verify.
        required: true
        default: https://isthereconsensus.org
      profile:
        description: Smoke profile to run.
        required: true
        default: production
        type: choice
        options:
          - production
          - frontend

env:
  NODE_VERSION: 24.x

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Show toolchain
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Run live smoke
        env:
          LIVE_SMOKE_BASE_URL: ${{ inputs.base_url }}
          LIVE_SMOKE_PROFILE: ${{ inputs.profile }}
        run: npm run smoke:live
